# LiveKit Server 配置
# 参考文档: https://docs.livekit.io/realtime/

# HTTP/WS 端口
port: 7880

# TURN 中继服务器配置 (使用外部 coturn 服务器)
turn:
  enabled: true
  domain: futurechat.dns.army
  relay_range_start: 42000
  relay_range_end: 42040
  udp_port: 43478

# RTC 配置
rtc:
  # TCP 转发端口 (用于防火墙受限环境)
  tcp_port: 7881
  # UDP 端口范围 (用于媒体传输)
  port_range_start: 41000
  port_range_end: 41040
  # 是否使用外部 IP (云服务器需设为 true 并配置 node_ip)
  use_external_ip: true
  # 指定 LiveKit 节点 IP (让 TURN 服务知道公网地址)
  node_ip: 112.30.139.26

# 房间配置
room:
  # 自动创建房间
  auto_create: true
  # 房间空闲超时 (秒)
  empty_timeout: 300
  # 房间最大参与者数
  max_participants: 10

# 日志配置
logging:
  level: info
  # Pion (WebRTC) 日志级别
  pion_level: warn

# API 密钥通过环境变量 LIVEKIT_KEYS 注入，不在此文件中配置

# Prometheus 指标导出 (可选)
# prometheus:
#   port: 9090

# 区域配置 (可选，多区域部署时使用)
# region: "cn-east"
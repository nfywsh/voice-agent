# docker-compose.yml
# 全双工语音聊天机器人 - 完整服务编排 (DashScope API 版本)
#
# 架构说明：
#   所有 AI 能力（LLM/ASR/TTS）通过阿里云 DashScope API 调用，
#   不再需要本地 GPU 和模型文件。
#
# 使用方式:
#   1. cp .env.example .env  # 配置环境变量
#   2. docker-compose up -d --build
#
# 服务说明：
#   - nginx: 反向代理 + 静态文件
#   - backend: Next.js Token 生成服务
#   - livekit: WebRTC SFU 服务器
#   - agent: LiveKit Agent (通过 DashScope API 调用 LLM/ASR)
#   - tts-service: TTS 代理层 (通过 DashScope API 调用 Qwen3-TTS)
#   - singing-service: 歌声服务 (Mock 模式)

version: "3.8"

services:
  # ============ 1. Nginx 反向代理 ============
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "40082:40082"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      livekit:
        condition: service_healthy
    networks:
      - voice-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ============ 2. Next.js Token 服务 ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_HOST: http://livekit:7880
      HOST: "0.0.0.0"
      PORT: "3000"
    networks:
      - voice-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
      disable: true
    restart: unless-stopped

  # ============ 3. LiveKit Server ============
  livekit:
    image: livekit/livekit-server:v1.11.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "${RTC_PORT_START:-50000}-${RTC_PORT_END:-50050}:${RTC_PORT_START:-50000}-${RTC_PORT_END:-50050}/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - voice-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ============ 4. TTS 代理服务 (DashScope API) ============
  tts-service:
    build:
      context: ./tts_service
      dockerfile: Dockerfile
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_TTS_MODEL: ${DASHSCOPE_TTS_MODEL:-qwen3-tts-instruct-flash-realtime-2026-01-22}
      DASHSCOPE_TTS_VOICE: ${DASHSCOPE_TTS_VOICE:-Cherry}
      HOST: "0.0.0.0"
      PORT: "8001"
    networks:
      - voice-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============ 5. 歌声服务 (Mock 模式) ============
  singing-service:
    build:
      context: ./singing_service
      dockerfile: Dockerfile
    environment:
      HOST: "0.0.0.0"
      PORT: "8002"
    networks:
      - voice-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ============ 6. LiveKit Agent (DashScope API) ============
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8082:8082"   # metrics 端点 (区别于 LiveKit 内部 8081)
    extra_hosts:
      - "host.docker.internal:172.17.1.53"
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_NUM_IDLE_PROCESSES: ${LIVEKIT_NUM_IDLE_PROCESSES:-1}
      # DashScope API 配置 (LLM + ASR)
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_ASR_MODEL: ${DASHSCOPE_ASR_MODEL:-fun-asr-realtime}
      # OpenAI 格式 ASR 配置 (可选，与 DashScope ASR 二选一)
      OPENAI_ASR_BASE_URL: ${OPENAI_ASR_BASE_URL:-}
      OPENAI_ASR_API_KEY: ${OPENAI_ASR_API_KEY:-}
      OPENAI_ASR_MODEL: ${OPENAI_ASR_MODEL:-whisper-1}
      # LLM 配置 (独立 API 端点，与 DashScope 分离)
      LLM_BASE_URL: ${LLM_BASE_URL:-https://jiajiatemp.duckdns.org:30002/v1/}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5-122b-a10b}
      # OpenAI 格式 LLM 配置 (可选，与上述 LLM 配置二选一)
      OPENAI_LLM_BASE_URL: ${OPENAI_LLM_BASE_URL:-}
      OPENAI_LLM_API_KEY: ${OPENAI_LLM_API_KEY:-}
      OPENAI_LLM_MODEL: ${OPENAI_LLM_MODEL:-gpt-4o}
      # OpenAI 格式 TTS 配置 (可选)
      OPENAI_TTS_BASE_URL: ${OPENAI_TTS_BASE_URL:-}
      OPENAI_TTS_API_KEY: ${OPENAI_TTS_API_KEY:-}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      # 微服务地址
      TTS_SERVICE_URL: http://tts-service:8001
      SINGING_SERVICE_URL: http://singing-service:8002
      # System Prompt
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-}
      PROMPT_SERVICE_URL: ${PROMPT_SERVICE_URL:-}
      # VAD 配置
      VAD_THRESHOLD: ${VAD_THRESHOLD:-0.5}
      VAD_MIN_SPEECH: ${VAD_MIN_SPEECH:-0.2}
      VAD_MIN_SILENCE: ${VAD_MIN_SILENCE:-0.3}
      # TTS 分片配置
      TTS_FIRST_CHUNK_MIN: ${TTS_FIRST_CHUNK_MIN:-30}
      TTS_MAX_CHUNK: ${TTS_MAX_CHUNK:-300}
      TTS_CHUNK_WAIT_SEC: ${TTS_CHUNK_WAIT_SEC:-5.0}
      TTS_MAX_CONCURRENT: ${TTS_MAX_CONCURRENT:-3}
      # 超时配置
      LLM_TIMEOUT: ${LLM_TIMEOUT:-5}
      TTS_TIMEOUT: ${TTS_TIMEOUT:-30}
      SINGING_TIMEOUT: ${SINGING_TIMEOUT:-30}
      # LLM 思考模式和聊天历史配置
      LLM_CHAT_TEMPLATE_KWARGS: '{"enable_thinking": false}'
      CHAT_HISTORY_MAX_TURNS: ${CHAT_HISTORY_MAX_TURNS:-10}
    depends_on:
      livekit:
        condition: service_healthy
      tts-service:
        condition: service_healthy
      singing-service:
        condition: service_healthy
    volumes:
      - /data/asr-temp:/data/asr-temp:rw
    networks:
      - voice-network
      - ai_net
    restart: unless-stopped

networks:
  voice-network:
    driver: bridge
  ai_net:
    external: true
# docker-compose.yml
# 全双工语音聊天机器人 - 完整服务编排
#
# 架构说明：
#   - LLM: 本地 VLLM (Qwen3.6-35B-A3B)
#   - ASR: 本地 FunASR 实时语音识别
#   - TTS: 本地 VLLM TTS (Qwen3-TTS-Base)
#   - 唱歌: Sing Agent (:8080)
#
# 使用方式:
#   1. cp .env.example .env  # 配置环境变量
#   2. docker-compose up -d --build
#
# 服务说明：
#   - nginx: 反向代理 + 静态文件
#   - backend: Next.js Token 生成服务
#   - livekit: WebRTC SFU 服务器
#   - agent: LiveKit Agent

version: "3.8"

services:
  # ============ 1. Nginx 反向代理 ============
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "40082:40082"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_started
      livekit:
        condition: service_healthy
    networks:
      - voice-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # ============ 2. Next.js Token 服务 ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:172.17.1.53"
    volumes:
      - /data/voice-temp:/data/voice-temp:ro
    environment:
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_HOST: http://livekit:7880
      HOST: "0.0.0.0"
      PORT: "3000"
      QWEN3_TTS_BASE_URL: ${QWEN3_TTS_BASE_URL:-http://host.docker.internal:8021}
    networks:
      - voice-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://$(hostname -i):3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
      disable: true
    restart: unless-stopped

  # ============ 3. LiveKit Server ============
  livekit:
    image: livekit/livekit-server:v1.11.0
    # 端口用于容器间通信 + 本地开发直连
    # 生产环境外部访问通过 nginx:40082/livekit/ 代理
    ports:
      - "7880:7880"
      - "7881:7881"
      - "${RTC_PORT_START:-41000}-${RTC_PORT_END:-41040}:${RTC_PORT_START:-41000}-${RTC_PORT_END:-41040}/udp"
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    networks:
      - voice-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped


  # ============ 4. LiveKit Agent (DashScope API) ============
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8082:8082"   # metrics 端点 (区别于 LiveKit 内部 8081)
    extra_hosts:
      - "host.docker.internal:172.17.1.53"
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_NUM_IDLE_PROCESSES: ${LIVEKIT_NUM_IDLE_PROCESSES:-1}
      # DashScope API 配置 (LLM + ASR)
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_ASR_MODEL: ${DASHSCOPE_ASR_MODEL:-fun-asr-realtime}
      # OpenAI 格式 ASR 配置 (可选，与 DashScope ASR 二选一)
      OPENAI_ASR_BASE_URL: ${OPENAI_ASR_BASE_URL:-}
      OPENAI_ASR_API_KEY: ${OPENAI_ASR_API_KEY:-}
      OPENAI_ASR_MODEL: ${OPENAI_ASR_MODEL:-whisper-1}
      # LLM 配置 (独立 API 端点，与 DashScope 分离)
      LLM_BASE_URL: ${LLM_BASE_URL:-https://jiajiatemp.duckdns.org:30002/v1/}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5-122b-a10b}
      # OpenAI 格式 LLM 配置 (可选，与上述 LLM 配置二选一)
      OPENAI_LLM_BASE_URL: ${OPENAI_LLM_BASE_URL:-}
      OPENAI_LLM_API_KEY: ${OPENAI_LLM_API_KEY:-}
      OPENAI_LLM_MODEL: ${OPENAI_LLM_MODEL:-gpt-4o}
      # VLLM 专用 LLM（处理 chat_template_kwargs 顶层注入，必须与 OPENAI_LLM_* 配合使用）
      USE_VLLM_LLM: ${USE_VLLM_LLM:-0}
      VLLM_CHAT_TEMPLATE_KWARGS: ${VLLM_CHAT_TEMPLATE_KWARGS:-}
      # OpenAI 格式 TTS 配置 (可选)
      OPENAI_TTS_BASE_URL: ${OPENAI_TTS_BASE_URL:-}
      OPENAI_TTS_API_KEY: ${OPENAI_TTS_API_KEY:-}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-tts-1}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      # Qwen3-TTS-Base 配置 (本地 VLLM，直连 8021)
      QWEN3_TTS_BASE_URL: ${QWEN3_TTS_BASE_URL:-http://host.docker.internal:8021}
      QWEN3_TTS_REF_AUDIO: ${QWEN3_TTS_REF_AUDIO:-/data/voice-temp/voices/voice_8fe34d12.wav}
      QWEN3_TTS_REF_TEXT: ${QWEN3_TTS_REF_TEXT:-这是一段参考音色的示例文本}
      # 微服务地址
      SING_AGENT_URL: http://sing_agent:8080
      # System Prompt
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-}
      PROMPT_SERVICE_URL: ${PROMPT_SERVICE_URL:-}
      # VAD 配置
      VAD_THRESHOLD: ${VAD_THRESHOLD:-0.5}
      VAD_MIN_SPEECH: ${VAD_MIN_SPEECH:-0.2}
      VAD_MIN_SILENCE: ${VAD_MIN_SILENCE:-0.3}
      # TTS 分片配置
      TTS_FIRST_CHUNK_MIN: ${TTS_FIRST_CHUNK_MIN:-30}
      TTS_MAX_CHUNK: ${TTS_MAX_CHUNK:-300}
      TTS_CHUNK_WAIT_SEC: ${TTS_CHUNK_WAIT_SEC:-5.0}
      TTS_MAX_CONCURRENT: ${TTS_MAX_CONCURRENT:-3}
      # 超时配置
      LLM_TIMEOUT: ${LLM_TIMEOUT:-5}
      QWEN3_TTS_TIMEOUT: ${QWEN3_TTS_TIMEOUT:-120}
      TTS_TIMEOUT: ${TTS_TIMEOUT:-30}
      SINGING_TIMEOUT: ${SINGING_TIMEOUT:-30}
      # LLM 思考模式和聊天历史配置
      LLM_CHAT_TEMPLATE_KWARGS: '{"enable_thinking": false}'
      CHAT_HISTORY_MAX_TURNS: ${CHAT_HISTORY_MAX_TURNS:-10}
    depends_on:
      livekit:
        condition: service_healthy
    volumes:
      - /data/voice-temp:/data/voice-temp:rw
    networks:
      - voice-network
      - ai_net
    restart: unless-stopped

networks:
  voice-network:
    driver: bridge
  ai_net:
    external: true